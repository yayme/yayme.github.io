<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Syne:wght@700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: rgba(255,250,242,0.98);
  --bg2: #FAF3E0;
  --text: #3A2C29;
  --muted: #8a7060;
  --accent: #D95F18;
  --border: #D6C6A9;
  --local: #a07848;
  --global-c: #D95F18;
  --skip: #e8dcc8;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: rgba(24,18,15,0.95);
    --bg2: #2C1810;
    --text: #F5E8C7;
    --muted: #9a7d65;
    --accent: #FF8A4C;
    --border: #5A3825;
    --local: #c4976a;
    --global-c: #FF8A4C;
    --skip: #1e140f;
  }
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); font-family: 'IBM Plex Mono', monospace; color: var(--text); }

.card {
  max-width: 560px;
  margin: 0 auto;
  padding: 20px 22px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--bg);
}

/* top row */
.top { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 16px; }
.top-left { flex: 1; }
.tag { font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--accent); margin-bottom: 6px; }
.title { font-family: 'Syne', sans-serif; font-size: 17px; font-weight: 700; color: var(--text); line-height: 1.2; }
.title span { color: var(--accent); }

.gh-link {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 9px; color: var(--muted); text-decoration: none;
  border: 1px solid var(--border); border-radius: 4px; padding: 4px 9px;
  white-space: nowrap; margin-top: 2px;
  transition: border-color 0.15s, color 0.15s;
}
.gh-link:hover { border-color: var(--accent); color: var(--accent); }
.gh-link svg { width: 11px; height: 11px; fill: currentColor; }

/* divider */
hr { border: none; border-top: 1px solid var(--border); margin-bottom: 14px; }

/* body grid */
.body { display: grid; grid-template-columns: auto 1fr; gap: 14px; align-items: start; }

/* attention grid */
.grid-wrap { display: flex; flex-direction: column; gap: 6px; }
.grid-label { font-size: 8px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }
.attn-grid { display: inline-grid; grid-template-columns: repeat(7,11px); gap: 1.5px; }
.cell { width: 11px; height: 11px; border-radius: 1px; }
.c-local  { background: var(--local); opacity: 0.85; }
.c-global { background: var(--global-c); }
.c-skip   { background: var(--skip); }

/* legend */
.legend { display: flex; gap: 8px; margin-top: 4px; }
.leg { display: flex; align-items: center; gap: 3px; font-size: 8px; color: var(--muted); }
.leg-dot { width: 7px; height: 7px; border-radius: 1px; flex-shrink: 0; }

/* right side */
.right { display: flex; flex-direction: column; gap: 10px; }

/* stats row */
.stats { display: flex; gap: 8px; }
.stat { flex: 1; background: var(--bg2); border: 1px solid var(--border); border-radius: 5px; padding: 8px 10px; text-align: center; }
.s-val { font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700; color: var(--accent); line-height: 1; margin-bottom: 3px; }
.s-lbl { font-size: 8px; color: var(--muted); letter-spacing: 0.05em; line-height: 1.3; }

/* v1→v2 diff */
.diff { background: var(--bg2); border: 1px solid var(--border); border-radius: 5px; padding: 9px 11px; }
.diff-title { font-size: 8px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
.diff-row { display: flex; justify-content: space-between; align-items: baseline; font-size: 9px; padding: 3px 0; border-bottom: 1px solid var(--border); gap: 6px; }
.diff-row:last-child { border-bottom: none; padding-bottom: 0; }
.d-label { color: var(--muted); }
.d-old { text-decoration: line-through; color: var(--muted); opacity: 0.6; }
.d-new  { color: var(--accent); font-weight: 500; }
</style>
</head>
<body>
<div class="card">
  <div class="top">
    <div class="top-left">
      <div class="tag">CUDA · GPU Kernels</div>
      <div class="title">Sparse <span>Attention</span> Kernel</div>
    </div>
    <a class="gh-link" href="https://github.com/yayme/CUDA-kernel" target="_blank">
      <svg viewBox="0 0 16 16"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
      yayme/CUDA-kernel
    </a>
  </div>
  <hr>
  <div class="body">
    <!-- left: attention pattern -->
    <div class="grid-wrap">
      <div class="grid-label">sparse pattern</div>
      <div class="attn-grid" id="grid"></div>
      <div class="legend">
        <div class="leg"><div class="leg-dot" style="background:var(--local)"></div>local</div>
        <div class="leg"><div class="leg-dot" style="background:var(--global-c)"></div>global</div>
        <div class="leg"><div class="leg-dot" style="background:var(--skip);border:1px solid var(--border)"></div>skip</div>
      </div>
    </div>

    <!-- right: stats + diff -->
    <div class="right">
      <div class="stats">
        <div class="stat"><div class="s-val">1.8×</div><div class="s-lbl">v2 speedup<br>over v1</div></div>
        <div class="stat"><div class="s-val">O(n·w)</div><div class="s-lbl">sparse<br>complexity</div></div>
        <div class="stat"><div class="s-val">O(1)</div><div class="s-lbl">per-thread<br>memory</div></div>
      </div>
      <div class="diff">
        <div class="diff-title">v1 → v2 key changes</div>
        <div class="diff-row">
          <span class="d-label">score storage</span>
          <span><span class="d-old">full array</span> → <span class="d-new">streaming</span></span>
        </div>
        <div class="diff-row">
          <span class="d-label">softmax</span>
          <span><span class="d-old">materialized</span> → <span class="d-new">online</span></span>
        </div>
        <div class="diff-row">
          <span class="d-label">register spill</span>
          <span><span class="d-old">yes</span> → <span class="d-new">eliminated</span></span>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const N = 7, W = 1, GS = 3;
const g = document.getElementById('grid');
for (let i = 0; i < N; i++) for (let j = 0; j < N; j++) {
  const c = document.createElement('div');
  const isG = i % GS === 0 || j % GS === 0;
  const isL = Math.abs(i-j) <= W;
  c.className = 'cell ' + (isG ? 'c-global' : isL ? 'c-local' : 'c-skip');
  g.appendChild(c);
}
</script>
</body>
</html>
